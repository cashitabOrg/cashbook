<body class="bg-wt-bg text-wt-fg select-none overflow-hidden h-screen w-screen">
  <div id="root"></div>

  <script type="module">
    import { createHighlighter } from 'https://cdn.jsdelivr.net/npm/shiki@3.22.0/+esm'
    
    const { useState, useEffect, useRef, useCallback } = React;

    const SUMMARY = "Cashbook is a resilient Next.js retail point-of-sale and store management application. It utilizes dynamic server-side pages and secure Server Actions built on Supabase, alongside an offline IndexedDB storage layer using Dexie. A background Sync Engine orchestrates connection recovery, ensuring POS checkout actions are processed chronologically and merged with cloud data once online.";

    const DIAGRAM = `
graph TD
    %% Class Definitions
    classDef component fill:#a855f7,stroke:#c084fc,color:#fff
    classDef composable fill:#7c3aed,stroke:#a78bfa,color:#fff
    classDef utility fill:#6d28d9,stroke:#8b5cf6,color:#fff
    classDef external fill:#525252,stroke:#737373,color:#fff
    classDef data fill:#9333ea,stroke:#a855f7,color:#fff

    subgraph user_auth["Access Control"]
        authService["Authentication Gate"]:::utility
    end

    subgraph server_layer["Next.js Server (BFF)"]
        storeSlugRoute["Next.js View Routes"]:::component
        readQueries["Backend Read Queries"]:::utility
        serverActions["Next.js Server Actions"]:::composable
    end

    subgraph client_layer["React Browser UI"]
        clientViews["Interactive UI Components"]:::component
        localDatabase["Dexie Local Database"]:::data
        syncOrchestrator["Background Sync Engine"]:::composable
    end

    subgraph external_layer["Data Services"]
        databaseClients["Supabase DB Clients"]:::external
    end

    %% Connections
    authService -->|"authorizes access"| storeSlugRoute
    storeSlugRoute -->|"calls"| readQueries
    readQueries -->|"queries"| databaseClients
    storeSlugRoute -->|"renders"| clientViews
    clientViews -->|"submits write mutations"| serverActions
    serverActions -->|"writes"| databaseClients
    clientViews -->|"records offline sales"| localDatabase
    localDatabase -->|"feeds queue"| syncOrchestrator
    syncOrchestrator -->|"syncs offline queue"| databaseClients

    %% Click Callbacks
    click authService nodeClickHandler "View details"
    click storeSlugRoute nodeClickHandler "View details"
    click readQueries nodeClickHandler "View details"
    click serverActions nodeClickHandler "View details"
    click clientViews nodeClickHandler "View details"
    click localDatabase nodeClickHandler "View details"
    click syncOrchestrator nodeClickHandler "View details"
    click databaseClients nodeClickHandler "View details"
`;

    const NODES = {
      authService: {
        title: "Authentication Gate",
        description: "Secures server views and mutation actions by validating session state, profile activity, and role-based permissions. Features resilient query-retry loops to mitigate transient network errors.",
        files: ["lib/auth.ts"],
        code: `export async function requireRole(allowedRoles: string[]) {
  const supabase = await createClient()
  // Wrap getUser in a retry loop to handle DNS/network stutters
  let user: any = null;
  let authError: any = null;
  let authAttempts = 0;
  const maxAuthAttempts = 2;

  while (authAttempts < maxAuthAttempts) {
    const { data, error } = await supabase.auth.getUser();
    if (!error && data.user) {
      user = data.user;
      break;
    }
    // ... handles connection delays and retries
  }`,
        lang: "typescript"
      },
      storeSlugRoute: {
        title: "Next.js View Routes",
        description: "Dynamic Next.js app routing layer that acts as the server view-controller. Performs authorization checks, retrieves server-cached queries, and passes structured data to interactive client components.",
        files: ["app/[storeSlug]/admin/products/page.tsx"],
        code: `export default async function AdminProductsPage({ params }) {
  const { storeSlug } = await params;
  const userRole = await requireRole(["admin", "super_admin"]);

  // Fetch store meta and products exclusively for this store
  const store = await getStoreMeta(userRole.storeId);
  const products = await getProducts(userRole.storeId);

  return (
    <AdminProductsClient 
      storeSlug={storeSlug} 
      products={products || []} 
      plan={store?.plan || 'free'}
    />
  );
}`,
        lang: "typescript"
      },
      readQueries: {
        title: "Backend Read Queries",
        description: "Database read interface designed for high-performance server rendering. Utilizes Supabase-admin client (service role) to bypass RLS, wrapped with stable revalidation cache structures.",
        files: ["lib/queries/products.ts"],
        code: `export const getProducts = unstable_cache(
  async (storeId: string): Promise<Product[]> => {
    const { data, error } = await withRetry<Product[]>(
      async () =>
        await supabaseAdmin
          .from('products')
          .select('id, store_id, name, unit, quantity, cost_price, selling_price')
          .eq('store_id', storeId)
          .order('name'),
      'getProducts'
    );
    if (error) console.error('[queries/products] getProducts error:', error.message);
    return data || [];
  },
  ['products'],
  { revalidate: 60, tags: ['products'] }
);`,
        lang: "typescript"
      },
      serverActions: {
        title: "Next.js Server Actions",
        description: "Backend mutation handlers that execute database writes securely. Enforces license tier capacity limits, logs price audit histories, and revalidates Next.js cached page routes after updates.",
        files: ["app/actions/products.ts"],
        code: `export async function addProduct(storeSlug: string, formData: FormData) {
  const userRole = await requireRole(["admin", "super_admin"]);
  // Verify plan limits & active subscription
  const subStatus = await checkActiveSubscription(userRole.storeId);
  if (!subStatus.active) return { error: subStatus.error };

  // Write product details securely using Supabase client
  const { error } = await supabase.from("products").insert({
    store_id: userRole.storeId,
    name, unit, min_quantity, cost_price, selling_price, quantity: 0,
  });

  revalidatePath(\`/\${storeSlug}/admin/products\`);
  return { success: true };
}`,
        lang: "typescript"
      },
      clientViews: {
        title: "Interactive UI Components",
        description: "Frontend-owned modular React views that handle user interactions, render responsive grids, control local search/filters, and initiate server actions or local database writes.",
        files: ["components/admin/AdminProductsClient.tsx"],
        code: `"use client";
export default function AdminProductsClient({ storeSlug, products, plan }) {
  const [search, setSearch] = useState("");
  const [isAdding, setIsAdding] = useState(false);

  const filtered = products.filter(p => p.name.toLowerCase().includes(search.toLowerCase()));
  // Renders responsive tables, restock logs, and adjustment drawers
}`,
        lang: "typescript"
      },
      localDatabase: {
        title: "Dexie Local Database",
        description: "IndexedDB wrapper that stores checkout sessions, offline sales, and pending sync actions. Enables Cashbook's manager POS interface to function completely offline during connectivity blackouts.",
        files: ["lib/db.ts"],
        code: `import Dexie, { type Table } from 'dexie';

export class CashbookDatabase extends Dexie {
  offlineQueue!: Table<OfflineQueueItem, number>;
  
  constructor() {
    super('CashbookDatabase');
    this.version(1).stores({
      offlineQueue: '++id, type, status, created_at',
      // Store-local caches for products and sales
    });
  }
}
export const db = new CashbookDatabase();`,
        lang: "typescript"
      },
      syncOrchestrator: {
        title: "Background Sync Engine",
        description: "Headless synchronizer that recovers interrupted tasks, processes Dexie's queue in chronological order, and handles duplicate upsert conflicts seamlessly when connection is restored.",
        files: ["components/SyncEngine.tsx"],
        code: `const processQueue = async () => {
  if (isSyncing.current) return;
  isSyncing.current = true;
  
  // recover orphaned entries and process pending items
  const pendingItems = await db.offlineQueue.where("status").equals("pending").toArray();
  for (const item of pendingItems) {
    if (item.type === "sale_item") {
      const { error } = await supabase.from("sale_items").upsert({
        id: item.payload.local_row_id,
        store_id: item.store_id,
        session_id: item.payload.session_id,
        product_id: item.payload.product_id,
        quantity: item.payload.quantity,
        subtotal: item.payload.subtotal,
      }, { onConflict: 'id', ignoreDuplicates: true });
      
      if (!error) await db.offlineQueue.delete(item.id);
    }
  }
};`,
        lang: "typescript"
      },
      databaseClients: {
        title: "Supabase DB Clients",
        description: "Custom Supabase database connectors optimized for context constraints: client-side browser client, server-side client with cookie integration, and admin client with service-role privileges.",
        files: ["lib/supabase.ts", "lib/supabase-server.ts", "lib/supabase-admin.ts"],
        code: `// lib/supabase-server.ts
export async function createClient() {
  const cookieStore = await cookies()
  return createServerClient(
    process.env.NEXT_PUBLIC_SUPABASE_URL!,
    process.env.NEXT_PUBLIC_SUPABASE_ANON_KEY!,
    {
      cookies: {
        getAll() { return cookieStore.getAll() },
        setAll(cookiesToSet) { cookiesToSet.forEach(({ name, value, options }) => cookieStore.set(name, value, options)) },
      },
    }
  )
}`,
        lang: "typescript"
      }
    };

    const LEGEND = [
      { label: 'Component (Views/Pages)', color: 'bg-node-component' },
      { label: 'Composable (State Hooks/Actions)', color: 'bg-node-composable' },
      { label: 'Utility (Logic/Queries/Security)', color: 'bg-node-utility' },
      { label: 'Data Store (IndexedDB/Cache)', color: 'bg-node-data' },
      { label: 'External (Services/Connectors)', color: 'bg-node-external' },
    ];

    // Pre-highlight with Shiki
    const langs = [...new Set(Object.values(NODES).map(n => n.lang).filter(Boolean))];
    if (langs.length === 0) langs.push('typescript');
    let highlighter = null;
    try {
      highlighter = await createHighlighter({ themes: ['vitesse-dark'], langs });
    } catch (e) {
      console.warn('Shiki highlighter failed to load:', e);
    }

    const HIGHLIGHTED = {};
    for (const [id, node] of Object.entries(NODES)) {
      if (node.code && highlighter) {
        try {
          HIGHLIGHTED[id] = highlighter.codeToHtml(node.code, {
            lang: node.lang || 'typescript',
            theme: 'vitesse-dark'
          });
        } catch (e) {
          console.warn(`Highlighting failed for node ${id}:`, e);
        }
      }
    }

    // usePanZoom Hook
    function usePanZoom() {
      const viewportRef = useRef(null), canvasRef = useRef(null), zoomDisplayRef = useRef(null);
      const st = useRef({ zoom: 1, panX: 0, panY: 0 });
      const drag = useRef({ on: false, lx: 0, ly: 0 });

      const apply = useCallback(() => {
        const { zoom, panX, panY } = st.current;
        if (canvasRef.current)
          canvasRef.current.style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
        if (zoomDisplayRef.current)
          zoomDisplayRef.current.textContent = Math.round(zoom * 100) + '%';
      }, []);

      const fitToScreen = useCallback(() => {
        const svg = canvasRef.current?.querySelector('svg');
        const vp = viewportRef.current;
        if (!svg || !vp) return;
        const s = st.current;
        const vw = vp.clientWidth, vh = vp.clientHeight;
        const sw = svg.getBoundingClientRect().width / s.zoom;
        const sh = svg.getBoundingClientRect().height / s.zoom;
        const fit = Math.max(0.15, Math.min(2, Math.min((vw - 80) / sw, (vh - 80) / sh)));
        s.zoom = fit; s.panX = (vw - sw * fit) / 2; s.panY = (vh - sh * fit) / 2;
        apply();
      }, [apply]);

      useEffect(() => {
        const vp = viewportRef.current;
        if (!vp) return;
        
        const onWheel = (e) => {
          e.preventDefault();
          const r = vp.getBoundingClientRect();
          const mx = e.clientX - r.left, my = e.clientY - r.top, s = st.current;
          const f = e.deltaY < 0 ? 1.12 : 1 / 1.12;
          const nz = Math.min(4, Math.max(0.15, s.zoom * f)), sc = nz / s.zoom;
          s.panX = mx - sc * (mx - s.panX); s.panY = my - sc * (my - s.panY); s.zoom = nz;
          apply();
        };

        const onDown = (e) => {
          if (e.target.closest('.node')) return;
          drag.current = { on: true, lx: e.clientX, ly: e.clientY };
          vp.setPointerCapture(e.pointerId);
        };

        const onMove = (e) => {
          const d = drag.current; if (!d.on) return;
          st.current.panX += e.clientX - d.lx; st.current.panY += e.clientY - d.ly;
          d.lx = e.clientX; d.ly = e.clientY; apply();
        };

        const onUp = () => { drag.current.on = false; };

        vp.addEventListener('wheel', onWheel, { passive: false });
        vp.addEventListener('pointerdown', onDown);
        vp.addEventListener('pointermove', onMove);
        vp.addEventListener('pointerup', onUp);
        vp.addEventListener('pointercancel', onUp);
        window.addEventListener('resize', fitToScreen);

        return () => {
          vp.removeEventListener('wheel', onWheel);
          vp.removeEventListener('pointerdown', onDown);
          vp.removeEventListener('pointermove', onMove);
          vp.removeEventListener('pointerup', onUp);
          vp.removeEventListener('pointercancel', onUp);
          window.removeEventListener('resize', fitToScreen);
        };
      }, [apply, fitToScreen]);

      const zoomIn = useCallback(() => { st.current.zoom = Math.min(4, st.current.zoom * 1.25); apply(); }, [apply]);
      const zoomOut = useCallback(() => { st.current.zoom = Math.max(0.15, st.current.zoom / 1.25); apply(); }, [apply]);
      return { viewportRef, canvasRef, zoomDisplayRef, zoomIn, zoomOut, fitToScreen };
    }

    // ZoomControls Component
    function ZoomControls({ zoomDisplayRef, onZoomIn, onZoomOut, onFit }) {
      return React.createElement('div', {
        className: 'fixed bottom-5 left-5 z-20 flex items-center gap-2 bg-wt-surface border border-wt-border rounded-lg p-1.5 shadow-xl'
      },
        React.createElement('button', {
          onClick: onZoomIn,
          className: 'w-8 h-8 rounded bg-wt-raised text-wt-fg hover:bg-wt-border flex items-center justify-center text-sm font-semibold transition-colors',
          title: 'Zoom In'
        }, '+'),
        React.createElement('span', {
          ref: zoomDisplayRef,
          className: 'min-w-[48px] text-center text-xs text-wt-muted font-medium'
        }, '100%'),
        React.createElement('button', {
          onClick: onZoomOut,
          className: 'w-8 h-8 rounded bg-wt-raised text-wt-fg hover:bg-wt-border flex items-center justify-center text-sm font-semibold transition-colors',
          title: 'Zoom Out'
        }, '−'),
        React.createElement('button', {
          onClick: onFit,
          className: 'w-8 h-8 rounded bg-wt-raised text-wt-fg hover:bg-wt-border flex items-center justify-center text-xs font-medium px-1 transition-colors',
          title: 'Fit to screen'
        }, 'Fit')
      );
    }

    // Summary Accordion Component
    function Summary({ collapsed, onToggle }) {
      if (collapsed) {
        return React.createElement('div', {
          onClick: onToggle,
          className: 'fixed top-20 left-6 z-10 px-3 py-1.5 bg-wt-surface/60 backdrop-blur border border-wt-border rounded-full shadow-lg cursor-pointer hover:bg-wt-surface/80 transition-all duration-300'
        },
          React.createElement('span', { className: 'text-xs text-wt-muted font-medium' }, 'ℹ︎ Summary')
        );
      }
      return React.createElement('div', {
        onClick: onToggle,
        className: 'fixed top-20 left-6 z-10 max-w-lg px-4 py-3 bg-wt-surface/80 backdrop-blur border border-wt-border rounded-lg shadow-lg cursor-pointer transition-all duration-300'
      },
        React.createElement('p', { className: 'text-sm text-wt-muted leading-relaxed' }, SUMMARY),
        React.createElement('p', { className: 'text-[0.65rem] text-wt-muted/50 mt-1.5' }, 'Click to dismiss')
      );
    }

    // Detail Panel Component
    function DetailPanel({ nodeId, node, onClose }) {
      useEffect(() => {
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        document.addEventListener('keydown', onKey);
        return () => document.removeEventListener('keydown', onKey);
      }, [onClose]);

      const codeHtml = HIGHLIGHTED[nodeId];

      const filesList = (node.files || []).map((f, i) => 
        React.createElement('span', { key: i }, f, React.createElement('br'))
      );

      return React.createElement('div', {
        className: 'fixed top-4 right-4 bottom-4 w-[560px] z-30 bg-wt-surface border border-wt-border rounded-xl shadow-2xl flex flex-col overflow-hidden animate-slide-in'
      },
        React.createElement('button', {
          onClick: onClose,
          className: 'absolute top-3 right-3 z-10 w-7 h-7 rounded-md border border-wt-border bg-wt-raised text-wt-muted flex items-center justify-center text-lg hover:bg-wt-red hover:border-wt-red hover:text-white transition-colors'
        }, '×'),
        React.createElement('div', {
          className: 'flex-1 overflow-y-auto p-5'
        },
          React.createElement('h2', { className: 'text-lg font-bold text-wt-fg mb-3 pr-9' }, node.title),
          React.createElement('div', { className: 'dt-body' }, 
            React.createElement('p', null, node.description)
          ),
          node.code && React.createElement('div', { className: 'dt-body' },
            codeHtml 
              ? React.createElement('div', { dangerouslySetInnerHTML: { __html: codeHtml } })
              : React.createElement('pre', { className: 'code-fallback' }, 
                  React.createElement('code', null, node.code)
                )
          ),
          node.files?.length > 0 && React.createElement('div', { className: 'mt-4 pt-3 border-t border-wt-border' },
            React.createElement('div', { className: 'text-[0.7rem] uppercase tracking-wider text-wt-muted font-semibold mb-1.5' }, 'Files'),
            React.createElement('code', { className: 'text-sm text-wt-file font-mono leading-relaxed' }, filesList)
          )
        )
      );
    }

    // MermaidDiagram Component
    function MermaidDiagram({ onNodeClick }) {
      const ref = useRef(null);
      useEffect(() => {
        window.nodeClickHandler = onNodeClick;
        mermaid.initialize({
          startOnLoad: false, theme: 'dark', securityLevel: 'loose',
          themeVariables: {
            primaryColor: '#0a0a0a', primaryTextColor: '#ffffff', primaryBorderColor: '#2a2a2a',
            lineColor: '#a0a0a0', background: '#000000',
            secondaryColor: '#000000', tertiaryColor: '#000000',
            mainBkg: '#0a0a0a', nodeBorder: '#2a2a2a',
            clusterBkg: 'rgba(10,10,10,0.8)', clusterBorder: '#7c3aed',
            titleColor: '#ffffff', edgeLabelBackground: 'transparent',
          },
          flowchart: { useMaxWidth: false, htmlLabels: true, curve: 'basis' },
        });
        
        mermaid.render('walkthrough-diagram', DIAGRAM).then(({ svg, bindFunctions }) => {
          if (ref.current) { 
            ref.current.innerHTML = svg; 
            bindFunctions?.(ref.current); 
          }
        }).catch(e => console.error('Mermaid render error:', e));

        return () => { delete window.nodeClickHandler; };
      }, [onNodeClick]);

      return React.createElement('div', { ref, className: 'mermaid-wrap' });
    }

    // App Component (Top-Level Wiring)
    function App() {
      const [activeId, _setActiveId] = useState(null);
      const [summaryCollapsed, setSummaryCollapsed] = useState(true);
      const pz = usePanZoom();

      const setActiveNode = useCallback((nodeId) => {
        _setActiveId(nodeId);
        document.querySelectorAll('.mermaid-wrap .node').forEach(n => { n.style.opacity = nodeId ? '0.4' : '1'; });
        if (nodeId) {
          const el = document.querySelector(`.mermaid-wrap .node[id*="${nodeId}"]`);
          if (el) el.style.opacity = '1';
        }
      }, []);

      const closeDetail = useCallback(() => {
        _setActiveId(null);
        document.querySelectorAll('.mermaid-wrap .node').forEach(n => { n.style.opacity = '1'; });
      }, []);

      useEffect(() => { setTimeout(pz.fitToScreen, 600); }, [pz.fitToScreen]);

      const legendItems = LEGEND.map(l => 
        React.createElement('span', { key: l.label, className: 'flex items-center gap-1.5 text-xs text-wt-muted animate-fade-in' },
          React.createElement('span', { className: `w-2 h-2 rounded-full ${l.color}` }),
          l.label
        )
      );

      return React.createElement(React.Fragment, null,
        React.createElement('header', { className: 'fixed top-0 inset-x-0 z-10 px-6 py-3.5 bg-gradient-to-b from-wt-bg to-transparent pointer-events-none' },
          React.createElement('h1', { className: 'text-base font-semibold text-wt-fg pointer-events-auto' }, 'Cashbook Codebase Architecture Walkthrough'),
          React.createElement('p', { className: 'text-sm text-wt-muted mt-0.5' }, 'Next.js App Router, Supabase Backend Services & Dexie Offline Sync Engine')
        ),
        React.createElement(Summary, { collapsed: summaryCollapsed, onToggle: () => setSummaryCollapsed(c => !c) }),
        React.createElement('div', { 
          ref: pz.viewportRef, 
          className: 'w-full h-screen overflow-hidden cursor-grab active:cursor-grabbing' 
        },
          React.createElement('div', { 
            ref: pz.canvasRef, 
            className: 'origin-top-left will-change-transform inline-block p-[80px_60px_60px]' 
          },
            React.createElement(MermaidDiagram, { onNodeClick: setActiveNode })
          )
        ),
        React.createElement(ZoomControls, { 
          zoomDisplayRef: pz.zoomDisplayRef, 
          onZoomIn: pz.zoomIn, 
          onZoomOut: pz.zoomOut, 
          onFit: pz.fitToScreen 
        }),
        React.createElement('div', { className: 'fixed bottom-5 left-1/2 -translate-x-1/2 z-20 flex gap-4 px-4 py-2 bg-wt-surface border border-wt-border rounded-lg shadow-xl' },
          legendItems
        ),
        activeId && NODES[activeId] && React.createElement(DetailPanel, { 
          nodeId: activeId, 
          node: NODES[activeId], 
          onClose: closeDetail 
        }),
        React.createElement('div', { className: 'fixed bottom-5 right-5 z-20 text-xs text-wt-muted opacity-50' },
          React.createElement('kbd', null, 'Scroll'), ' zoom · ',
          React.createElement('kbd', null, 'Drag'), ' pan · Click nodes'
        )
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  </script>
